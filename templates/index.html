{% extends 'base.html' %}
{% block content %}

<!-- Button tambah tugasan -->
<a href="{{ url_for('add_task') }}" class="btn">+ Tambah Tugasan</a>

<!-- Senarai tugasan -->
{% for task in tasks %}

<div class="task" style="border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px; font-family:Arial, sans-serif;">

    <h3>{{ task.title }}</h3>

    <p>📅 {{ task.date }}</p>
    <p>⏰ {{ task.time | format_time }}</p>
    <p>🔁 {{ task.repeat }}</p>

    <div class="buttons" style="display:flex; gap:10px; flex-wrap:wrap;">

        <a href="{{ url_for('edit_task', id=task.id) }}" class="edit" style="padding:5px 10px; background:#4CAF50; color:white; border-radius:5px; text-decoration:none;">Edit</a>

        <a href="{{ url_for('delete_task', id=task.id) }}" class="delete" style="padding:5px 10px; background:#f44336; color:white; border-radius:5px; text-decoration:none;">Padam</a>

        <a href="{{ url_for('change_priority', id=task.id, value=-1) }}" class="up" style="padding:5px 10px; background:#2196F3; color:white; border-radius:5px; text-decoration:none;">⬆</a>

        <a href="{{ url_for('change_priority', id=task.id, value=1) }}" class="down" style="padding:5px 10px; background:#FF9800; color:white; border-radius:5px; text-decoration:none;">⬇</a>

    </div>

</div>

{% endfor %}

{% endblock %}
